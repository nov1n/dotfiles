name: Lint

on:
  push:
    branches: [main]
    paths:
      - "**.sh"
      - "Makefile"
      - ".github/workflows/lint.yml"
  pull_request:
    paths:
      - "**.sh"
      - "Makefile"
      - ".github/workflows/lint.yml"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Run lint
        run: make lint
