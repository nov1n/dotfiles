setw -g mode-keys vi
set -g status-position top
set -g prefix C-a
set -g mouse
set -g detach-on-destroy off
set -g focus-events on
set-option -ga terminal-overrides ",xterm-256color:Tc,xterm-ghostty:Tc"
# Start numbering at 1
set -g pane-base-index 1
set -g base-index 1
set-window-option -g pane-base-index 1
set-window-option -g mode-keys vi
set-option -g renumber-windows on

# Keybindings
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind u split-window -h -l 40% -c "#{pane_current_path}" "/opt/homebrew/bin/zsh -lc 'exec claude'"
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"
bind-key b send-prefix # Leader key for nested tmux sessions
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'C-v' send -X rectangle-toggle
bind-key -T copy-mode-vi 'y' send -X copy-selection-and-cancel
bind g display-popup -w 90% -h 90% -E "lazygit"

# Seamless nvim/tmux split navigation with smart-splits.nvim.
# Alt+h/j/k/l moves between panes (or nvim splits when nvim is focused).
# Alt+Shift+H/J/K/L resizes panes (or nvim splits when nvim is focused).
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n M-h if-shell "$is_vim" 'send-keys M-h' 'select-pane -L'
bind-key -n M-j if-shell "$is_vim" 'send-keys M-j' 'select-pane -D'
bind-key -n M-k if-shell "$is_vim" 'send-keys M-k' 'select-pane -U'
bind-key -n M-l if-shell "$is_vim" 'send-keys M-l' 'select-pane -R'

bind-key -n M-H if-shell "$is_vim" 'send-keys M-H' 'resize-pane -L 3'
bind-key -n M-J if-shell "$is_vim" 'send-keys M-J' 'resize-pane -D 3'
bind-key -n M-K if-shell "$is_vim" 'send-keys M-K' 'resize-pane -U 3'
bind-key -n M-L if-shell "$is_vim" 'send-keys M-L' 'resize-pane -R 3'

bind-key "s" run-shell "sesh connect \"$(
  sesh list --icons | fzf --tmux center,50%,50% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --margin 1,2 --padding 1,2 \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
)\""
# Plugin configurations
set -g @continuum-restore 'on'   # auto-restore last saved session on tmux start

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin "janoamaral/tokyo-night-tmux"
set -g @plugin 'fcsonline/tmux-thumbs'  # prefix+space: hint-label copy of on-screen text
# These two must be last (resurrect before continuum)
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TMUX plugin manager and install plugins. Keep this line at the very bottom of tmux.conf.
run '~/.tmux/plugins/tpm/tpm'

# Always reserve a blank pane border-status line, so a pane's border format can
# be swapped (e.g. claude-notify.sh's attention banner) without resizing the
# pane. Must be after the tpm run above: tokyo-night-tmux sets it off, so this
# has to load last to win.
set -g pane-border-status top
set -g pane-border-format ''
set -g pane-active-border-style fg=#2A2F41
set -g pane-border-style fg=#2A2F41
